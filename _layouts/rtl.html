<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --text: #1a1a1a;
      --muted: #5a5a5a;
      --accent: #7a5c2e;
      --border: #d8d4cc;
      --surface: #f6f4f0;
      --max-w: 820px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14141a;
        --text: #d8d8e0;
        --muted: #8a8a98;
        --accent: #c2a878;
        --border: #32323c;
        --surface: #1c1c24;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans Hebrew", "Arial Hebrew", "Segoe UI", Arial, sans-serif;
      font-size: 18px;
      line-height: 1.9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
      text-align: right;
    }

    h1, h2, h3, h4 {
      line-height: 1.4;
      margin: 2.2rem 0 1rem;
      font-weight: 700;
    }

    h1 {
      font-size: 1.9rem;
      margin-top: 0;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid var(--accent);
    }

    h2 { font-size: 1.4rem; color: var(--accent); }
    h3 { font-size: 1.15rem; }
    h4 { font-size: 1rem; }

    p { margin-bottom: 1.1rem; }

    ul, ol {
      margin: 0 1.5rem 1.2rem 0;
      padding-right: 0.8rem;
    }

    li { margin-bottom: 0.5rem; }

    a { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    a:hover { text-decoration-thickness: 2px; }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1.5rem auto;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    blockquote {
      background: var(--surface);
      border-right: 3px solid var(--accent);
      padding: 1rem 1.4rem;
      margin: 0 0 1.2rem;
    }

    table {
      display: block;
      overflow-x: auto;
      max-width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.95rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 0.6rem 0.9rem;
      text-align: right;
    }

    th { background: var(--surface); font-weight: 700; }

    code {
      background: var(--surface);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      direction: ltr;
      display: inline-block;
    }

    .doc-nav {
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
    }

    .doc-nav a { color: var(--muted); text-decoration: none; }
    .doc-nav a:hover { color: var(--accent); }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    footer a { color: var(--muted); }

    @media (max-width: 600px) {
      body { font-size: 16px; }
      h1 { font-size: 1.5rem; }
      h2 { font-size: 1.2rem; }
      main { padding: 2rem 1.1rem 3rem; }
    }
  </style>
</head>
<body>
  {% if page.url != "/law_proposal/" %}
  <div class="doc-nav"><a href="/law_proposal/">← חזרה לרשימת המסמכים</a></div>
  {% endif %}
  <main>
    {{ content }}
  </main>
  <footer><a href="/">civitaslucida.com</a></footer>
</body>
</html>
