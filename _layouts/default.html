<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #16161a;
      --border: #2a2a30;
      --text: #c8c8d0;
      --muted: #6a6a78;
      --accent: #a08c6e;
      --heading: #e8e4dc;
      --max-w: 680px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 18px;
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.4rem;
      font-weight: normal;
      letter-spacing: 0.18em;
      color: var(--heading);
      text-transform: uppercase;
    }

    .lang-switcher {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
    }

    .lang-switcher button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.7rem;
      transition: color 0.2s, border-color 0.2s;
    }

    .lang-switcher button.active,
    .lang-switcher button:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    main {
      flex: 1;
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
      width: 100%;
    }

    .lang-ru, .lang-en { display: none; }
    .lang-ru.active, .lang-en.active { display: block; }

    .tagline {
      margin-bottom: 3rem;
      text-align: center;
      color: var(--muted);
      font-style: italic;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2.5rem 0;
    }

    h2 {
      font-size: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    p {
      margin-bottom: 1rem;
      color: var(--text);
    }

    blockquote {
      background: var(--surface);
      border-left: 2px solid var(--accent);
      padding: 1.5rem 1.8rem;
      margin: 0;
    }

    blockquote p { font-style: italic; }

    .support-note {
      font-style: italic;
      color: var(--muted);
    }

    .muted { color: var(--muted); font-style: italic; }

    .wip {
      border-top: 1px solid var(--border);
      padding-top: 2rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.03em;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      letter-spacing: 0.05em;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.7rem; }
      body { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Civitas Lucida</h1>
    <div class="lang-switcher">
      <button onclick="setLang('ru')" id="btn-ru" class="active">RU</button>
      <button onclick="setLang('en')" id="btn-en">EN</button>
    </div>
  </header>
  <main>
    {{ content }}
  </main>
  <footer>civitaslucida.com</footer>
  <script>
    function setLang(lang) {
      document.querySelectorAll('.lang-ru, .lang-en').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.lang-switcher button').forEach(b => b.classList.remove('active'));
      document.querySelector('.lang-' + lang).classList.add('active');
      document.getElementById('btn-' + lang).classList.add('active');
      localStorage.setItem('cl-lang', lang);
    }
    var saved = localStorage.getItem('cl-lang') || 'ru';
    setLang(saved);
  </script>
</body>
</html>
